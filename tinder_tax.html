const SWIPE_THRESHOLD = 100;
const PASS_THRESHOLD  = 0.80;

// ── useSwipe хук ────────────────────────────────────────────────
function useSwipe({ onLeft, onRight, disabled }) {
  const [drag, setDrag] = useState({ dragging:false, x:0, y:0, startX:0, startY:0 });
  const gc = e => e.touches ? { x:e.touches[0].clientX, y:e.touches[0].clientY } : { x:e.clientX, y:e.clientY };

  const onStart = useCallback(e => {
    if (disabled) return;
    const { x, y } = gc(e);
    setDrag({ dragging:true, x:0, y:0, startX:x, startY:y });
  }, [disabled]);

  const onMove = useCallback(e => {
    setDrag(d => {
      if (!d.dragging) return d;
      const { x, y } = gc(e);
      return { ...d, x: x - d.startX, y: y - d.startY };
    });
  }, []);

  const onEnd = useCallback(() => {
    setDrag(d => {
      if (!d.dragging) return d;
      if (Math.abs(d.x) > SWIPE_THRESHOLD) d.x > 0 ? onRight() : onLeft();
      return { dragging:false, x:0, y:0, startX:0, startY:0 };
    });
  }, [onLeft, onRight]);

  return { drag, handlers:{ onMouseDown:onStart, onMouseMove:onMove, onMouseUp:onEnd, onMouseLeave:onEnd, onTouchStart:onStart, onTouchMove:onMove, onTouchEnd:onEnd } };
}

// ── Кнопка ───────────────────────────────────────────────────────
const Btn = ({ onClick, variant='primary', size='md', label, ariaLabel, children, style:extra={} }) => {
  const base = { display:'flex', alignItems:'center', justifyContent:'center', gap:6, border:'none', cursor:'pointer', fontFamily:'inherit', fontWeight:600, transition:'all .15s', ...extra };
  const variants = {
    primary:  { background:'var(--accent)',    color:'#fff', boxShadow:'0 4px 14px rgba(40,151,255,.30)' },
    ghost:    { background:'var(--surface)',    color:'var(--text)',    border:'1.5px solid var(--border)' },
    danger:   { background:'var(--red-bg)',     color:'var(--red)',     border:'1.5px solid var(--red-border)' },
    success:  { background:'var(--green-bg)',   color:'var(--green)',   border:'1.5px solid var(--green-border)' },
  };
  const sizes = {
    sm: { fontSize:13, padding:'8px 16px', borderRadius:'var(--r-sm)' },
    md: { fontSize:14, padding:'12px 20px', borderRadius:'var(--r-md)' },
    lg: { fontSize:15, padding:'14px 24px', borderRadius:'var(--r-lg)', width:'100%' },
  };
  const [hov, setHov] = useState(false);
  return h('button', {
    onClick, 'aria-label':ariaLabel||label,
    onMouseOver:()=>setHov(true), onMouseOut:()=>setHov(false),
    style:{ ...base, ...variants[variant], ...sizes[size], opacity: hov ? .88 : 1, transform: hov ? 'translateY(-1px)' : 'none', ...extra }
  }, children || label);
};

                h('path',{d:'M1.5 5l2.5 2.5 4.5-5',stroke:'var(--accent)',strokeWidth:1.6,strokeLinecap:'round',strokeLinejoin:'round'}))
            ),
            h('span', { style:{fontSize:13, lineHeight:1.55, color:'var(--text)'} }, goal)
          )
        )
      ),

      // Инструкция
      h('div', { style:{marginBottom:24} },
        h('div', { style:{fontSize:11, fontWeight:700, color:'var(--text-hint)', letterSpacing:.6, textTransform:'uppercase', marginBottom:10} }, 'Как это работает'),
        ...[
          'Вам будет показано 20 отраслевых ситуаций',
          'Перемещайте карточку вправо — ОНА, влево — ОНО (или используйте кнопки)',
          'После каждого ответа вы увидите объяснение',
          'В конце вас ждёт итоговый слайд со статистикой',
        ].map((step, i) =>
          h('div', { key:i, style:{display:'flex', alignItems:'flex-start', gap:10, marginBottom: i<3?8:0} },
            h('div', { style:{
              width:18, height:18, borderRadius:99, background:'var(--accent)', color:'#fff',
              fontSize:10, fontWeight:700, flexShrink:0, marginTop:1,
              display:'flex', alignItems:'center', justifyContent:'center',
            }}, i+1),
            h('span', { style:{fontSize:13, lineHeight:1.55, color:'var(--text-sec)'} }, step)
          )
        )
      ),

      // Кнопка
      h('button', {
        onClick: onStart,
        style:{
          width:'100%', padding:'14px', borderRadius:'var(--r-lg)',
          background:'var(--accent)', color:'#fff', border:'none',
          fontSize:15, fontWeight:700, cursor:'pointer', fontFamily:'inherit',
          boxShadow:'0 4px 14px rgba(40,151,255,.35)',
          transition:'all .15s',
        },
        onMouseOver:e=>{ e.currentTarget.style.background='var(--accent-dk)'; e.currentTarget.style.transform='translateY(-1px)'; },
        onMouseOut: e=>{ e.currentTarget.style.background='var(--accent)';    e.currentTarget.style.transform='none'; },
      }, 'Начать')
    )
  );
}

// ── Главный компонент ─────────────────────────────────────────────
function App() {
  const [intro, setIntro]       = useState(true);
  const [idx, setIdx]           = useState(0);
  const [score, setScore]       = useState(0);
  const [answers, setAnswers]   = useState([]);
  const [modal, setModal]       = useState(false);
  const [result, setResult]     = useState(null);
  const [done, setDone]         = useState(false);
  const [review, setReview]     = useState(false);
  const [exitDir, setExitDir]   = useState(null);
  const [cardKey, setCardKey]   = useState(0);
  const [entering, setEntering] = useState(false);
  const pending = useRef(null);
  const cardStart = useRef(Date.now());

  const total   = cards.length;
  const current = cards[idx];

  useEffect(() => { cardStart.current = Date.now(); }, [idx]);

  const commit = useCallback(() => {
    const { chosen, card } = pending.current;
    const ok = chosen === card.correctAnswer;
    setResult({ chosen, ok, card });
    setAnswers(p => [...p, { chosen, ok, card }]);
    if (ok) setScore(s => s+1);
    pending.current = null;
    setModal(true);
  }, []);

  const answer = useCallback(chosen => {
    if (modal || done || exitDir || pending.current) return;
    pending.current = { chosen, card: current };
    setExitDir(chosen === 'ОНА' ? 'right' : 'left');
    setTimeout(commit, 340);
  }, [modal, done, exitDir, current, commit]);

  const next = useCallback(() => {
    const finalScore = answers.reduce((a,x)=>a+(x.ok?1:0),0) + (result?.ok?1:0);
    setModal(false);
    const ni = idx + 1;
    if (ni >= total) { setScore(finalScore); setDone(true); return; }
    setExitDir(null); setIdx(ni); setCardKey(k=>k+1);
    setEntering(true);
    requestAnimationFrame(()=>requestAnimationFrame(()=>setEntering(false)));
  }, [answers, result, idx, total]);

  const restart = useCallback(() => {
    setIdx(0); setScore(0); setAnswers([]); setModal(false);
    setResult(null); setDone(false); setReview(false); setExitDir(null);
    setCardKey(k=>k+1); setEntering(true);
    requestAnimationFrame(()=>requestAnimationFrame(()=>setEntering(false)));
  }, []);

  const answerONO = useCallback(()=>answer('ОНО'),[answer]);
  const answerONA = useCallback(()=>answer('ОНА'),[answer]);

  const { drag, handlers } = useSwipe({
    onLeft:  answerONO,
    onRight: answerONA,
    disabled: !!(modal||done||exitDir),
  });

  const dx = drag.x;
  const overlayOp = drag.dragging ? Math.min(Math.abs(dx)/150,.8) : 0;
  const isRight = dx > 20, isLeft = dx < -20;

  let tf, tr;
  if (exitDir==='right')   { tf='translateX(110vw) rotate(22deg)';  tr='transform .34s cubic-bezier(.4,0,.2,1)'; }
  else if (exitDir==='left'){ tf='translateX(-110vw) rotate(-22deg)';tr='transform .34s cubic-bezier(.4,0,.2,1)'; }
  else if (entering)        { tf='translateY(28px) scale(.98)';      tr='none'; }
  else if (drag.dragging)   { tf=`translateX(${dx}px) translateY(${drag.y*.25}px) rotate(${dx*.06}deg)`; tr='none'; }
  else                      { tf='translateY(0) scale(1) translateX(0) rotate(0)'; tr='transform .28s cubic-bezier(.4,0,.2,1)'; }

  const pct = (idx/total)*100;

  // ══ Экран разбора ошибок ══════════════════════════════════════
  if (done && review) {
    const mistakes = answers.filter(a=>!a.ok);
    const onoErr = mistakes.filter(a=>a.card.correctAnswer==='ОНО').length;
    const onaErr = mistakes.filter(a=>a.card.correctAnswer==='ОНА').length;

    return h('div', { style:{minHeight:'100vh', background:'var(--bg)', fontFamily:'inherit', padding:'0 0 40px'} },
      // Шапка
      h('div', { style:{background:'var(--surface)', borderBottom:'1px solid var(--border)', padding:'16px 20px', display:'flex', alignItems:'center', gap:12, position:'sticky', top:0, zIndex:10} },
        h('button', {
          onClick:()=>setReview(false),
          'aria-label':'Назад',
          style:{background:'none', border:'1px solid var(--border)', borderRadius:'var(--r-sm)', width:36, height:36, cursor:'pointer', display:'flex', alignItems:'center', justifyContent:'center', color:'var(--text-sec)', flexShrink:0}
        }, h('svg',{width:16,height:16,viewBox:'0 0 16 16',fill:'none'}, h('path',{d:'M10 3L5 8l5 5',stroke:'currentColor',strokeWidth:1.8,strokeLinecap:'round',strokeLinejoin:'round'}))),
        h('div', { style:{flex:1} },
          h('div', { style:{fontSize:15, fontWeight:700, color:'var(--text)'} }, 'Разбор ошибок'),
          h('div', { style:{fontSize:12, color:'var(--text-sec)'} }, mistakes.length+' из '+total+' неверно')
        ),
        mistakes.length > 0 && h('span', { style:{background:'var(--red-bg)', color:'var(--red)', border:'1px solid var(--red-border)', borderRadius:99, padding:'3px 10px', fontSize:12, fontWeight:600} }, mistakes.length)
      ),

      h('div', { style:{maxWidth:560, margin:'0 auto', padding:'20px 16px'} },

        // Сводка по категориям
        mistakes.length > 0 && h('div', { style:{display:'grid', gridTemplateColumns:'1fr 1fr', gap:10, marginBottom:20} },
          h('div', { style:{background:'var(--surface)', border:'1px solid var(--border)', borderRadius:'var(--r-md)', padding:'16px', textAlign:'center', boxShadow:'var(--shadow-sm)'} },
            h('div', { style:{fontSize:30, fontWeight:800, color: onoErr>0?'var(--red)':'var(--green)'} }, onoErr),
            h('div', { style:{fontSize:12, fontWeight:600, color:'var(--text)', marginTop:4} }, 'ошибок — ОНО'),
            h('div', { style:{fontSize:11, color:'var(--text-hint)', marginTop:2} }, 'Налогооблагаемые ВР')
          ),
          h('div', { style:{background:'var(--surface)', border:'1px solid var(--border)', borderRadius:'var(--r-md)', padding:'16px', textAlign:'center', boxShadow:'var(--shadow-sm)'} },
            h('div', { style:{fontSize:30, fontWeight:800, color: onaErr>0?'var(--red)':'var(--green)'} }, onaErr),
            h('div', { style:{fontSize:12, fontWeight:600, color:'var(--text)', marginTop:4} }, 'ошибок — ОНА'),
            h('div', { style:{fontSize:11, color:'var(--text-hint)', marginTop:2} }, 'Вычитаемые ВР')
          )
        ),

        // Рекомендация
        mistakes.length > 0 && h('div', { style:{background:'var(--accent-bg)', border:'1px solid #BAD9FD', borderRadius:'var(--r-md)', padding:'14px 16px', marginBottom:20, display:'flex', gap:10, alignItems:'flex-start'} },
          h('span', { style:{fontSize:18, flexShrink:0} }, '💡'),
          h('p', { style:{fontSize:13, lineHeight:1.65, color:'#1A5FAA', margin:0} },
            onoErr > onaErr
              ? 'Больше ошибок в теме ОНО. Повторите: когда балансовая стоимость актива превышает налоговую базу — налогооблагаемая ВР → ОНО (Дт 68 / Кт 77).'
              : onaErr > onoErr
              ? 'Больше ошибок в теме ОНА. Повторите: когда расход признан в БУ, но не принят в НУ — вычитаемая ВР → ОНА (Дт 09 / Кт 68).'
              : 'Ошибки распределены поровну между ОНА и ОНО — стоит повторить оба раздела.'
          )
        ),

        // Карточки ошибок
        ...mistakes.map((a, i) => {
          const num = answers.findIndex(x=>x===a);
          return h('div', { key:i, style:{background:'var(--surface)', border:'1px solid var(--border)', borderRadius:'var(--r-lg)', padding:'20px', marginBottom:12, boxShadow:'var(--shadow-sm)'} },
            h('div', { style:{display:'flex', alignItems:'center', gap:8, flexWrap:'wrap', marginBottom:12} },
              h('span', { style:{fontSize:11, fontWeight:600, color:'var(--text-hint)'} }, 'Ситуация #'+(num+1)),
              h('div', { style:{marginLeft:'auto', display:'flex', gap:6} },
                h(Pill, {ok:false}, '✗ Вы: '+a.chosen),
                h(Pill, {ok:true},  '✓ '+a.card.correctAnswer)
              )
            ),
            h('p', { style:{fontSize:14, lineHeight:1.7, color:'var(--text)', marginBottom:12, fontWeight:500} }, a.card.situation),
            h('div', { style:{background:'var(--bg)', borderRadius:'var(--r-sm)', padding:'12px 14px', borderLeft:'3px solid var(--accent)'} },
              h('p', { style:{fontSize:13, lineHeight:1.65, color:'var(--text-sec)', margin:0} }, a.card.explanation)
            )
          );
        }),

        mistakes.length === 0 && h('div', { style:{textAlign:'center', padding:'48px 0', color:'var(--text-sec)'} },
          h('div', { style:{fontSize:40, marginBottom:12} }, '🎉'),
          h('div', { style:{fontSize:16, fontWeight:600, color:'var(--text)'} }, 'Ошибок нет!'),
          h('div', { style:{fontSize:13, marginTop:4} }, 'Вы ответили правильно на все вопросы.')
        ),

        h('div', { style:{marginTop:8} },
          h(Btn, { onClick:restart, variant:'primary', size:'lg', ariaLabel:'Пройти заново' }, '↩ Пройти заново')
        )
      )
    );
  }

  // ══ Экран результатов ════════════════════════════════════════
  if (done) {
    const p = Math.round((score/total)*100);
    const passed = score/total >= PASS_THRESHOLD;
    const wrong = answers.filter(a=>!a.ok).length;

    return h('div', { style:{minHeight:'100vh', background:'var(--bg)', display:'flex', alignItems:'center', justifyContent:'center', padding:16, fontFamily:'inherit'} },
      h('div', { style:{background:'var(--surface)', borderRadius:'var(--r-xl)', padding:'40px 32px', maxWidth:440, width:'100%', textAlign:'center', boxShadow:'var(--shadow-lg)', border:'1px solid var(--border)'} },

        // Статус
        h('div', { style:{marginBottom:20} },
          h(Pill, {ok:passed}, passed ? '✓ Зачтено' : '✗ Не зачтено')
        ),

        // Большой счёт
        h('div', { style:{fontSize:56, fontWeight:800, color: passed?'var(--green)':p>=60?'#F59E0B':'var(--red)', lineHeight:1, marginBottom:8} }, score+'/'+total),
        h('div', { style:{fontSize:14, color:'var(--text-sec)', marginBottom:4} }, p+'% правильных ответов'),
        h('div', { style:{fontSize:12, color:'var(--text-hint)', marginBottom:28} }, 'Порог зачёта: 80% (16 из 20)'),

        // Полоски
        h('div', { style:{display:'flex', gap:4, marginBottom:28} },
          ...answers.map((a,i) => h('div', {
            key:i, role:'img',
            'aria-label':'Вопрос '+(i+1)+': '+(a.ok?'верно':'неверно'),
            title:'Ситуация #'+(i+1)+': '+(a.ok?'✓':'✗'),
            style:{flex:1, height:6, borderRadius:3, background:a.ok?'var(--green)':'var(--red)', opacity:a.ok?1:.7}
          }))
        ),

        // Сообщение
        h('p', { style:{fontSize:14, color:'var(--text-sec)', lineHeight:1.7, marginBottom:28} },
          passed ? 'Отличный результат! Вы уверенно разбираетесь в теме ОНА и ОНО по IAS 12 / ПБУ 18/02.'
                 : 'Рекомендуем повторить тему временных разниц. Разбор ошибок поможет понять, где именно возникли затруднения.'
        ),

        // Кнопки
        h('div', { style:{display:'flex', flexDirection:'column', gap:10} },
          wrong > 0 && h(Btn, { onClick:()=>setReview(true), variant:'ghost', size:'lg', ariaLabel:'Разбор ошибок' },
            h('span', null, '🔍 Разбор ошибок'),
            h('span', { style:{background:'var(--red-bg)',color:'var(--red)',border:'1px solid var(--red-border)',borderRadius:99,padding:'1px 8px',fontSize:11,fontWeight:700,marginLeft:4} }, wrong)
          ),
          h(Btn, { onClick:restart, variant:'primary', size:'lg', ariaLabel:'Пройти заново' }, '↩ Пройти заново')
        )
      )
    );
  }

  // ══ Основной экран ════════════════════════════════════════════
  return h('div', { style:{position:'relative'} },
    intro && h(Intro, { onStart: ()=>setIntro(false) }),
    h('div', {
    style:{minHeight:'100vh', background:'var(--bg)', display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center', fontFamily:'inherit', userSelect:'none', padding:'12px 0 24px'}
  },

    // ── Шапка ──
    h('div', { className:'header-bar', style:{width:'100%', maxWidth:480, padding:'0 20px 14px', boxSizing:'border-box'} },
      // Лого-строка
      h('div', { style:{display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:14} },
        h('span', { style:{fontSize:13, fontWeight:700, color:'var(--text)', letterSpacing:.3} }, 'ОНА или ОНО?'),
        h('div', { 'aria-live':'polite', style:{display:'flex', alignItems:'center', gap:12} },
          h('span', { style:{fontSize:13, color:'var(--text-sec)', fontWeight:500} },
            h('span',{style:{color:'var(--accent)',fontWeight:700}}, idx+1), ' / '+total
          ),
          h('span', { style:{background:'var(--green-bg)', color:'var(--green)', border:'1px solid var(--green-border)', borderRadius:99, padding:'2px 10px', fontSize:12, fontWeight:600} }, '✓ '+score)
        )
      ),
      // Прогресс-бар
      h('div', {
        role:'progressbar', 'aria-valuenow':idx, 'aria-valuemin':0, 'aria-valuemax':total,
        style:{background:'var(--border)', borderRadius:99, height:4, overflow:'hidden'}
      },
        h('div', { style:{height:'100%', background:'var(--accent)', borderRadius:99, width:pct+'%', transition:'width .4s ease'} })
      )
    ),

    // ── Панель ссылок ──
    h('div', { style:{width:'100%', maxWidth:480, padding:'0 20px', boxSizing:'border-box', display:'flex', gap:8, marginBottom:10, marginTop:12} },
      ...[
        { label:'Инструкция', onClick: ()=>setIntro(true), href: null },
        { label:'IAS 12',     onClick: null, href:'https://minfin.gov.ru/common/upload/library/2017/01/main/MSFO_IAS_12.pdf' },
        { label:'ПБУ 18/02',  onClick: null, href:'https://base.garant.ru/12129425/' },
      ].map(({ label, onClick, href }) =>
        h(href ? 'a' : 'button', {
          key: label,
          ...(href ? { href, target:'_blank', rel:'noopener noreferrer' } : { onClick }),
          style:{
            flex:1, padding:'7px 4px', borderRadius:'var(--r-sm)',
            background:'var(--surface)', border:'1.5px solid #BAD9FD',
            color:'var(--accent)', fontSize:12, fontWeight:600,
            cursor:'pointer', fontFamily:'inherit', textAlign:'center',
            textDecoration:'none', display:'flex', alignItems:'center', justifyContent:'center',
            transition:'all .15s', boxShadow:'var(--shadow-sm)',
          },
          onMouseOver:e=>{ e.currentTarget.style.background='var(--accent-bg)'; e.currentTarget.style.borderColor='var(--accent)'; },
          onMouseOut: e=>{ e.currentTarget.style.background='var(--surface)';   e.currentTarget.style.borderColor='#BAD9FD'; },
        }, label)
      )
    ),

    // ── Подсказки свайпа ──
    h('div', { style:{width:'100%', maxWidth:480, padding:'0 20px', boxSizing:'border-box', display:'flex', justifyContent:'space-between', marginBottom:10} },
      h('div', { style:{display:'flex', alignItems:'center', gap:5, fontSize:12, fontWeight:600, color:'var(--text-sec)', opacity: isLeft?1:.3, transition:'opacity .15s', background: isLeft?'var(--border)':'transparent', border:`1px solid ${isLeft?'var(--border)':'transparent'}`, borderRadius:99, padding:'4px 12px'} },
        h('span',null,'←'), 'ОНО'
      ),
      h('div', { style:{display:'flex', alignItems:'center', gap:5, fontSize:12, fontWeight:600, color:'var(--accent)', opacity: isRight?1:.3, transition:'opacity .15s', background: isRight?'var(--accent-bg)':'transparent', border:`1px solid ${isRight?'#BAD9FD':'transparent'}`, borderRadius:99, padding:'4px 12px'} },
        'ОНА', h('span',null,'→')
      )
    ),

    // ── Стопка карточек ──
    h('div', { style:{width:'100%', maxWidth:480, padding:'0 20px', boxSizing:'border-box', position:'relative'} },
      // Тени
      idx+1<total && h('div',{style:{position:'absolute',top:8,left:28,right:28,bottom:0,background:'var(--surface)',borderRadius:'var(--r-xl)',border:'1px solid var(--border)',boxShadow:'var(--shadow-sm)',zIndex:0}}),
      idx+2<total && h('div',{style:{position:'absolute',top:16,left:40,right:40,bottom:0,background:'var(--bg)',borderRadius:'var(--r-xl)',border:'1px solid var(--border)',zIndex:0}}),

      // Карточка
      h('div', Object.assign({
        key: cardKey,
        role:'region', 'aria-label':'Карточка с ситуацией',
        className:'card-body',
        style:{
          position:'relative', zIndex:10,
          background:'var(--surface)',
          borderRadius:'var(--r-xl)',
          border:'1px solid var(--border)',
          padding:'28px 24px',
          cursor: drag.dragging?'grabbing':'grab',
          transform: tf, transition: tr,
          boxShadow:'var(--shadow-lg)',
          minHeight:320, display:'flex', flexDirection:'column',
          overflow:'hidden',
        }
      }, handlers),

        // Цветовой оверлей при свайпе
        h('div', { style:{position:'absolute',inset:0,borderRadius:'inherit',
          background: isLeft?`rgba(180,185,190,${overlayOp})`:isRight?`rgba(40,151,255,${overlayOp})`:'transparent',
          pointerEvents:'none', transition:'background .08s', display:'flex', alignItems:'center', justifyContent:'center', zIndex:20} },
          overlayOp > 0.18 && h('div', { style:{
            fontSize:44, fontWeight:800, color: isLeft?'var(--text)':'white', letterSpacing:1,
            textShadow:'0 2px 12px rgba(0,0,0,.10)',
            opacity: Math.min(overlayOp*2.2, 1),
            background: isLeft?'rgba(200,205,210,.90)':'rgba(40,151,255,.85)',
            borderRadius:'var(--r-md)', padding:'8px 20px'
          }}, isLeft?'ОНО':'ОНА')
        ),

        // Номер карточки
        h('div', { style:{display:'flex', alignItems:'center', justifyContent:'space-between', marginBottom:18} },
          h('span', { style:{fontSize:11, fontWeight:600, color:'var(--text-hint)', letterSpacing:.5, textTransform:'uppercase', display:'flex', flexDirection:'column', lineHeight:1.4} },
            h('span', null, 'Ситуация'),
            h('span', null, '#'+(idx+1)+' из '+total)
          )
        ),

        // Текст ситуации
        h('p', { className:'card-text', style:{fontSize:15, lineHeight:1.75, color:'var(--text)', fontWeight:400, flexGrow:1, margin:0, marginBottom:16} }, current.situation),

        // Отрасль внизу слева
        h(Tag, null, current.industry)
      )
    ),

    // ── Кнопки ──
    h('div', { style:{display:'flex', alignItems:'center', gap:16, marginTop:20, padding:'0 20px'} },
      // ОНО (влево)
      h('button', {
        onClick: answerONO,
        'aria-label':'ОНО — Отложенное налоговое обязательство',
        className:'btn-circle',
        style:{
          width:68, height:68, borderRadius:99,
          background:'var(--surface)',
          border:'2px solid #BAD9FD',
          color:'var(--accent)',
          cursor:'pointer',
          display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center', gap:2,
          boxShadow:'var(--shadow-md)',
          transition:'all .15s',
          flexShrink:0,
        },
        onMouseOver:e=>{ e.currentTarget.style.background='var(--accent-bg)'; e.currentTarget.style.transform='scale(1.08)'; },
        onMouseOut: e=>{ e.currentTarget.style.background='var(--surface)';   e.currentTarget.style.transform='scale(1)'; },
      },
        h('span',{style:{fontSize:18}}, '←'),
        h('span',{style:{fontSize:9, fontWeight:700, letterSpacing:.5}}, 'ОНО')
      ),

      // Центральный текст-подсказка
      h('div', { style:{flex:1, textAlign:'center'} },
        h('div', { style:{fontSize:11, color:'var(--text-hint)'} }, 'свайп или кнопка')
      ),

      // ОНА (вправо)
      h('button', {
        onClick: answerONA,
        'aria-label':'ОНА — Отложенный налоговый актив',
        className:'btn-circle',
        style:{
          width:68, height:68, borderRadius:99,
          background:'var(--accent)',
          border:'2px solid var(--accent)',
          color:'#fff',
          cursor:'pointer',
          display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center', gap:2,
          boxShadow:'0 6px 20px rgba(40,151,255,.35)',
          transition:'all .15s',
          flexShrink:0,
        },
        onMouseOver:e=>{ e.currentTarget.style.background='var(--accent-dk)'; e.currentTarget.style.transform='scale(1.08)'; },
        onMouseOut: e=>{ e.currentTarget.style.background='var(--accent)';    e.currentTarget.style.transform='scale(1)'; },
      },
        h('span',{style:{fontSize:18}}, '→'),
        h('span',{style:{fontSize:9, fontWeight:700, letterSpacing:.5}}, 'ОНА')
      )
    ),

    // ── Модальное окно ──
    modal && result && h('div', {
      role:'dialog', 'aria-modal':'true', 'aria-label':'Результат ответа',
      style:{position:'fixed',inset:0,background:'rgba(0,0,0,.35)',display:'flex',alignItems:'flex-end',justifyContent:'center',zIndex:100,backdropFilter:'blur(3px)',animation:'fadeIn .2s ease'}
    },
      h('div', { className:'modal-body', style:{
        background:'var(--surface)', borderRadius:'var(--r-xl) var(--r-xl) 0 0',
        padding:'28px 24px 36px', maxWidth:480, width:'100%',
        animation:'slideUp .28s cubic-bezier(.4,0,.2,1)',
        boxSizing:'border-box',
        borderTop:'1px solid var(--border)',
        boxShadow:'var(--shadow-lg)',
      }},
        // Шапка результата
        h('div', { style:{display:'flex', alignItems:'center', gap:12, marginBottom:16} },
          h('div', { style:{
            width:44, height:44, borderRadius:12, flexShrink:0,
            background: result.ok?'var(--green-bg)':'var(--red-bg)',
            border:`1.5px solid ${result.ok?'var(--green-border)':'var(--red-border)'}`,
            display:'flex', alignItems:'center', justifyContent:'center',
            fontSize:20, color: result.ok?'var(--green)':'var(--red)',
          }}, result.ok?'✓':'✗'),
          h('div', null,
            h('div', { style:{fontSize:16, fontWeight:700, color: result.ok?'var(--green)':'var(--red)'} }, result.ok?'Правильно!':'Не совсем…'),
            h('div', { style:{fontSize:12, color:'var(--text-sec)'} }, 'Верный ответ: ',
              h('strong',{style:{color:'var(--text)'}}, result.card.correctAnswer)
            )
          ),
          // Бейдж "что выбрал"
          !result.ok && h('div', { style:{marginLeft:'auto'} },
            h(Pill, {ok:false}, 'Вы: '+result.chosen)
          )
        ),

        // Объяснение
        h('div', { style:{background:'var(--bg)', borderRadius:'var(--r-md)', padding:'14px 16px', marginBottom:20, borderLeft:`3px solid ${result.ok?'var(--green)':'var(--accent)'}`} },
          h('div', { style:{fontSize:11, fontWeight:600, color:'var(--text-hint)', letterSpacing:.5, textTransform:'uppercase', marginBottom:6} }, 'Объяснение'),
          h('p', { style:{fontSize:13, lineHeight:1.7, color:'var(--text-sec)', margin:0} }, result.card.explanation)
        ),

        // Кнопка далее
        h(Btn, {
          onClick:next, variant:'primary', size:'lg',
          ariaLabel: idx+1>=total?'Посмотреть результаты':'Следующая карточка'
        }, idx+1>=total ? 'Результаты →' : 'Следующая →')
      )
    )
  ));
}

ReactDOM.createRoot(document.getElementById('root')).render(h(React.StrictMode, null, h(App)));
</script>
</body>
</html>
